<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<title>Keynote</title>
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no"/>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

<style>
/* 浮动控制条 */
#controlPanel {
  position: fixed;
  left: 20px;
  bottom: 20px;
  background: #ffffff;
  padding: 8px 12px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 9999;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.3s;
}
#controlPanel:hover {
  opacity: 1;
}
#controlPanel button {
  background: #007aff;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
}
#controlPanel button:hover {
  background: #0062cc;
}
</style>

</head>
<body id="body" bgcolor="black">

<div id="stageArea">
  <div id="stage" class="stage"></div>
  <div id="hyperlinkPlane" class="stage"></div>
</div>

<div id="slideshowNavigator"></div>
<div id="slideNumberControl"></div>
<div id="slideNumberDisplay"></div>
<div id="helpPlacard"></div>
<div id="waitingIndicator"><div id="waitingSpinner"></div></div>

<script src="assets/player/main.js"></script>

<!-- 浮动控制面板 -->
<div id="controlPanel">
  <button onclick="prev()">上一页</button>
  <button onclick="next()">下一页</button>
  <button onclick="home()">首页</button>
  <button onclick="fullScreen()">全屏</button>
</div>

<script>
function getPage() {
  let p = location.hash.replace("#","");
  return isNaN(p) ? 0 : parseInt(p);
}
function prev() {
  let p = getPage();
  if(p>0) location.hash = p-1;
}
function next() {
  let p = getPage();
  location.hash = p+1;
}
function home() {
  location.hash = 0;
}
function fullScreen() {
  document.documentElement.requestFullscreen();
}

// 键盘支持
document.addEventListener("keydown", function(e){
  if(e.key === "ArrowLeft") prev();
  if(e.key === "ArrowRight") next();
});
</script>

</body>
</html>
